# PHP-FPM + Nginx. MySQL runs on your machine (localhost); inside the container
# that host is reached as host.docker.internal — Compose sets DB_HOST for you.
#
#   docker compose build
#   docker compose up -d
#   docker compose exec php composer install
#   docker compose exec php php artisan migrate
#
# App: http://localhost:8080  — set APP_URL=http://localhost:8080 in .env
# MySQL on host: keep DB_HOST=127.0.0.1 in .env for host-side artisan; Docker
# overrides DB_HOST to host.docker.internal for PHP-FPM only.
#
# Ensure MySQL on the host listens for Docker (e.g. bind-address) and allows
# the app user from remote hosts if required.
#
# Vite on the host: npm run dev
#
services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: amstruexamine-php
        restart: unless-stopped
        volumes:
            - ./:/var/www/html
        networks:
            - app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            # Inside a container, 127.0.0.1 is not your Mac; this points at host MySQL
            DB_HOST: host.docker.internal

    nginx:
        image: nginx:1.27-alpine
        container_name: amstruexamine-nginx
        restart: unless-stopped
        ports:
            - '8080:80'
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php
        networks:
            - app

networks:
    app:
        driver: bridge
